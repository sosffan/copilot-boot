<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; style-src {{cspSource}} 'unsafe-inline'; script-src {{cspSource}};">

    <link rel="stylesheet" href="{{styleUri}}">
    <script type="module" src="{{toolkitUri}}"></script>

    <title>CopilotBoot Manager</title>
</head>

<body>
    <main>
        <div id="home-page">
            <section class="card-header">
                <h3>Available Instructions</h3>
                <vscode-button id="go-to-create" appearance="primary">
                    <span slot="start" class="codicon codicon-add"></span>
                    Init New
                </vscode-button>
            </section>

            <div id="instruction-list">
                <div class="empty-state" style="border:none; padding: 40px 0;">
                    <div class="spinner"></div>
                    <p style="color: var(--vscode-descriptionForeground);">Scanning ~/.copilotboot/templates ...</p>
                </div>
            </div>
        </div>

        <div id="create-page" class="hidden">
            <section>
                <a href="#" id="back-to-home" class="nav-link"
                    style="color: var(--vscode-textLink-foreground); text-decoration: none; display: inline-flex; align-items: center; gap: 4px; margin-bottom: 16px;">
                    <span class="codicon codicon-arrow-left"></span>
                    Back to Overview
                </a>

                <h2 style="margin: 0 0 20px 0; font-weight: 600;">Initialize New Instruction</h2>

                <div id="create-error-banner"
                    style="display: none; background: var(--vscode-statusBarItem-errorBackground); color: var(--vscode-statusBarItem-errorForeground); padding: 8px 12px; margin-bottom: 20px; border-radius: 4px; font-size: 12px;">
                </div>

                <div class="instruction-card" style="margin-top: 10px; border: 1px solid var(--vscode-widget-border);">
                    <div class="form-group">
                        <label for="inst-name"
                            style="display: block; margin-bottom: 6px; font-size: 11px; text-transform: uppercase; opacity: 0.8;">Instruction
                            Name</label>
                        <vscode-textfield id="inst-name" placeholder="e.g. backend-api (slug format)"
                            style="width: 100%;"></vscode-textfield>
                        <div id="name-error"
                            style="color: var(--vscode-errorForeground); font-size: 11px; margin-top: 4px; display: none;">
                            Use only letters, numbers, hyphens and underscores.
                        </div>
                    </div>

                    <div class="form-group" style="margin-top: 16px;">
                        <label for="inst-desc"
                            style="display: block; margin-bottom: 6px; font-size: 11px; text-transform: uppercase; opacity: 0.8;">Detailed
                            Description</label>
                        <vscode-textarea id="inst-desc" placeholder="What coding standards or logic does this cover?"
                            rows="4" style="width: 100%;"></vscode-textarea>
                    </div>

                    <div class="form-group" style="margin-top: 16px;">
                        <label for="inst-type"
                            style="display: block; margin-bottom: 6px; font-size: 11px; text-transform: uppercase; opacity: 0.8;">Target
                            AI Tool</label>
                        <vscode-single-select id="inst-type" style="width: 100%;">
                            <vscode-option value="">Select tool architecture...</vscode-option>
                        </vscode-single-select>
                    </div>

                    <div id="mapping-container" class="form-group hidden" style="margin-top: 16px;">
                        <label
                            style="display: block; margin-bottom: 8px; font-size: 11px; text-transform: uppercase; opacity: 0.8;">Components
                            to Standardize</label>
                        <vscode-multi-select id="inst-mapping" style="width: 100%;">
                            <!-- Dynamic options -->
                        </vscode-multi-select>
                    </div>

                    <div class="form-group"
                        style="margin-top: 30px; border-top: 1px solid var(--vscode-divider); padding-top: 20px;">
                        <vscode-button id="save-instruction" disabled style="width: 100%;">
                            Scaffold & Apply Instruction
                        </vscode-button>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <script type="module" src="{{scriptUri}}"></script>
</body>

</html>
